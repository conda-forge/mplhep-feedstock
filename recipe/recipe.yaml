schema_version: 1

context:
  version: "1.3.1"
  python_min: "3.11"

package:
  name: mplhep
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mplhep/mplhep-${{ version }}.tar.gz
  sha256: deb40ca24d93b62edcae28785c291c15a0413d5de0c9cc5a488ea9b5386b5fc9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - matplotlib-base >=3.11.0
    - numpy >=1.25.0
    - mplhep_data >=0.0.4
    - uhi >=0.2.0

tests:
  - python:
      imports:
        - mplhep
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"


about:
  license: MIT
  license_file: LICENSE
  summary: Matplotlib styles for HEP
  homepage: https://github.com/scikit-hep/mplhep
  repository: https://github.com/scikit-hep/mplhep
  documentation: https://mplhep.readthedocs.io/

extra:
  recipe-maintainers:
    - andrzejnovak
    - jonas-eschle
    - conda-forge/scikit-hep
